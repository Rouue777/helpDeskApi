version: '3.9'

services:

  postgres:
    image: postgres:17

    container_name: helpdesk-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helpdesk

    ports:
      - "5432:5432"

  api:
    build: .

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/helpdesk

    container_name: helpdesk-api

    ports:
      - "3000:3000"

    depends_on:
      - postgres